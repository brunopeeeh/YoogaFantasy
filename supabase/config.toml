project_id = "yooga-fantasy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
max_rows = 1000

[db]
major_version = 17

[db.pooler]
enabled = true
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[auth]
enabled = true
enable_signup = true

[auth.email]
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[analytics]
enabled = false
