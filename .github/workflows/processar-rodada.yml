name: Processar Rodada

on:
  workflow_dispatch:
    inputs:
      rodada:
        description: "Número da rodada"
        required: true
        type: number
      forcar:
        description: "Reprocessar jogos já pontuados"
        required: false
        default: false
        type: boolean
      sem_abrir:
        description: "Não abrir próxima rodada ao final"
        required: false
        default: false
        type: boolean
      deadline:
        description: "Deadline ISO da próxima rodada (opcional)"
        required: false
        type: string
      modo:
        description: "Modo de execução"
        required: false
        default: "completo"
        type: choice
        options:
          - completo
          - apenas-pontos
          - fechar-mercado
          - abrir-proxima
  schedule:
    - cron: "30 13 * * 1-5"  # 10:30 BRT — atualiza pontuação diária

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r backend/requirements.txt

      - name: Processar rodada (cron — apenas pontuação)
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m backend.fechar_rodada --apenas-pontos

      - name: Processar rodada (manual)
        if: github.event_name != 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS="--rodada ${{ inputs.rodada }}"
          if [[ "${{ inputs.forcar }}" == "true" ]]; then ARGS="$ARGS --forcar"; fi
          if [[ "${{ inputs.sem_abrir }}" == "true" ]]; then ARGS="$ARGS --sem-abrir"; fi
          if [[ "${{ inputs.deadline }}" != "" ]]; then ARGS="$ARGS --deadline '${{ inputs.deadline }}'"; fi
          MODO="${{ inputs.modo }}"
          if [[ "$MODO" != "" && "$MODO" != "completo" ]]; then ARGS="$ARGS --$MODO"; fi
          python -m backend.fechar_rodada $ARGS
